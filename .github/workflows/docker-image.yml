name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*" # semantic version releases

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Determine Docker tags
      - name: Determine Docker tags
        id: vars
        run: |

          # Extract repo name from github.repository (owner/repo)
          IMAGE_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # This is a release tag
            VERSION_TAG=${GITHUB_REF#refs/tags/}
            echo "DOCKER_TAGS_PRIMARY=$VERSION_TAG" >> $GITHUB_ENV
            echo "DOCKER_TAGS=$VERSION_TAG,latest" >> $GITHUB_ENV
          else
            # This is a regular branch commit
            BUILD_TAG=${GITHUB_SHA::7}  # first 7 chars of commit SHA
            echo "DOCKER_TAGS_PRIMARY=$BUILD_TAG" >> $GITHUB_ENV
            echo "DOCKER_TAGS=$BUILD_TAG,edge" >> $GITHUB_ENV
          fi

      # 4. Build Docker image (single primary tag)
      - name: Build Docker image
        run: docker build -t ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAGS_PRIMARY }} .

      # 5. Tag and push all tags
      - name: Tag and push Docker image
        run: |
          for TAG in $(echo ${{ env.DOCKER_TAGS }} | tr ',' ' '); do
            docker tag ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAGS_PRIMARY }} ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG
            docker push ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG
          done
